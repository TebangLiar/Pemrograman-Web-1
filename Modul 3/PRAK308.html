<html>
<head>
    <title> Pendaftaran Kursus </title>
</head>
<body bgcolor="#dddddd">
    <form>
        <table border="1" width="600" align="center" cellspacing="0">
            
            <tr bgcolor="#87CEEB">
                <td colspan="2" align="center">
                    <h1 style="color:red; font-family: Arial;"> Pendaftaran Kursus </h1>
                </td>
            </tr>
            
            <!-- Bagian Data Diri -->
            <tr bgcolor="#808080">
                <td colspan="2" style="padding: 10px;">
                    <h2 style="margin-top: 0;">Data Diri</h2>
                    <table>
                        <tr>
                            <td width="150">Nama</td>
                            <td><input type="text" name="nama" value="Ahmad Riyadhi"></td>
                        </tr>
                        <tr>
                            <td>Nim</td>
                            <td><input type="text" name="nim" value="2510817110004"></td>
                        </tr>
                        <tr>
                            <td>E-mail</td>
                            <td><input type="email" name="email"></td>
                        </tr>
                        <tr>
                            <td>Tanggal Lahir</td>
                            <td><input type="text" name="tgl_lahir" placeholder="hh/bb/tttt"></td>
                        </tr>
                        <tr>
                            <td valign="top">Jenis Kelamin</td>
                            <td>
                                <input type="radio" name="jk" value="L"> Laki-laki <br>
                                <input type="radio" name="jk" value="P"> Perempuan
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">Pilih Program Kursus</td>
                            <td>
                                <input type="checkbox" name="kursus_1" value="C#"> C# <br>
                                <input type="checkbox" name="kursus_2" value="Java"> Java <br>
                                <input type="checkbox" name="kursus_3" value="SQL"> SQL <br>
                                <input type="checkbox" name="kursus_4" value="HTML_PHP"> HTML dan PHP
                            </td>
                        </tr>
                        <tr>
                            <td>Pilihan Hari/Jam Kursus</td>
                            <td>
                                <select name="jadwal">
                                    <option>Senin - Rabu/09.00 - 11.00</option>
                                    <option>Selasa - Kamis/13.00 - 15.00</option>
                                    <option>Sabtu - Minggu/10.00 - 12.00</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            
            <tr bgcolor="#FA8072">
                <td colspan="2" style="padding: 10px;">
                    <span style="font-size:14px;"> Komentar Anda<br></span>
                    <textarea name="komentar" cols="60" rows="5"></textarea>
                    <br><br>
                    <input type="reset" value="Reset">
                    <input type="submit" value="Submit">
                    <input type="button" value="Cancel">
                </td>
            </tr>
            
        </table>
    </form>
</body>
</html>
